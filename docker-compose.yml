services:
  rekindled-ds3-server:
    image: jakeroxs/rekindled-ds3-server:latest # For Dark Souls 3 server
    container_name: rekindled-ds3-server
    ports:
      - "50000:50000/udp" # auth
      - "50010:50010/udp" # game
      - "50050:50050/udp" # login
      - "50005:50005" # admin WebUI
    volumes:
      - ./Saved-ds3:/opt/rekindled-ds3-server/Saved
    # Optional environment variables (override values from config.json):
    # environment:
    #   # Hub server listing (defaults to rekindled.jakesws.xyz:50020)
    #   - MASTER_SERVER_IP=rekindled-hub
    #   - MASTER_SERVER_PORT=50020
    #
    #   # Server settings
    #   - SERVER_NAME=My Server
    #   - SERVER_DESCRIPTION=A custom Dark Souls server
    #   - SERVER_HOSTNAME=example.com
    #   - SERVER_PRIVATE_HOSTNAME=192.168.1.100
    #
    #   # Behavior toggles
    #   - QUIET_LOGGING=false
    #   - ADVERTISE=true
    #   - ADVERTISE_HEARTBEAT_TIME=30
    #   - SUPPORT_SHARDING=true
    #
    #   # Access control / mods
    #   - PASSWORD=secret
    #   - MODS_WHITELIST=mod1,mod2
    #   - MODS_BLACKLIST=mod3
    #   - MODS_REQUIRED_LIST=mod1,mod2
    #
    #   # Ports (These override internal server ports; prefer using the ports: section for mapping to host)
    #   - LOGIN_SERVER_PORT=50050
    #   - AUTH_SERVER_PORT=50060
    #   - GAME_SERVER_PORT=50010
    #   - WEBUI_SERVER_PORT=50005
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:50005/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  rekindled-ds2s-server: # For Dark Souls 2: Scholar of the First Sin server
    image: jakeroxs/rekindled-ds2s-server:latest
    container_name: rekindled-ds2s-server
    ports:
      - "51000:50000/udp" # auth
      - "51010:50010/udp" # game
      - "51050:50050/udp" # login
      - "51005:50005" # admin WebUI
    volumes:
      - ./Saved-ds2:/opt/rekindled-ds2s-server/Saved
    # Optional environment variables (override values from config.json):
    # environment:
    #   # Hub server listing (defaults to rekindled.jakesws.xyz:50020)
    #   - MASTER_SERVER_IP=rekindled-hub
    #   - MASTER_SERVER_PORT=50020
    #
    #   # Server settings
    #   - SERVER_NAME=My Server
    #   - SERVER_DESCRIPTION=A custom Dark Souls server
    #   - SERVER_HOSTNAME=example.com
    #   - SERVER_PRIVATE_HOSTNAME=192.168.1.100
    #
    #   # Behavior toggles
    #   - QUIET_LOGGING=false
    #   - ADVERTISE=true
    #   - ADVERTISE_HEARTBEAT_TIME=30
    #   - SUPPORT_SHARDING=true
    #
    #   # Access control / mods
    #   - PASSWORD=secret
    #   - MODS_WHITELIST=mod1,mod2
    #   - MODS_BLACKLIST=mod3
    #   - MODS_REQUIRED_LIST=mod1,mod2
    #
    #   # Ports (These override internal server ports; prefer using the ports: section for mapping to host)
    #   - LOGIN_SERVER_PORT=50050
    #   - AUTH_SERVER_PORT=50060
    #   - GAME_SERVER_PORT=50010
    #   - WEBUI_SERVER_PORT=50005
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:50005/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # rekindled-hub:                 # Uncomment if you need a standalone hub server
  #   image: jakeroxs/rekindled-hub:latest
  #   container_name: rekindled-hub
  #   ports:
  #     - "50020:50020"
  #   environment:
  #     # Optional overrides for hub server settings (defaults are in config.json):
  #     - SHARDING_ALLOWLIST=192.168.1.50,192.168.1.51
  #     - HUB_SERVER_PORT=50020
  #     - HUB_SERVER_TIMEOUT_MS=240000
  #     - HUB_SERVER_WRITE_SECRET=your-secret
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL","curl -fsS http://localhost:50020/api/v1/servers || exit 1"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  # By default the master server is disabled since most users just run the game server
  # Uncomment the above block or create a separate compose file if you want to host
  # a public/master service alongside rekindled-ds3-server.
