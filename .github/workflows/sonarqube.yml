name: SonarQube analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name that triggered analysis from upstream workflow"
        required: false
        default: "main"

permissions:
  pull-requests: read

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - name: Show dispatch tracing info
        run: |
          echo "Triggered on ref: ${{ github.ref }}"
          echo "Requested branch input: ${{ github.event.inputs.branch }}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential pkg-config libsqlite3-dev libssl-dev uuid-dev

      - name: Cache SonarQube scanner plugins
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-plugin-cache-${{ runner.os }}
          restore-keys: sonar-plugin-cache-${{ runner.os }}-

      - name: Configure CMake (generates compile_commands.json)
        run: cmake -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=dsos
            -Dsonar.sources=.
            -Dsonar.exclusions=Source/ThirdParty/**,Protobuf/**,build/**
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
            -Dsonar.cfamily.threads=4
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.verbose=true
